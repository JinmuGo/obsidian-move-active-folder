# Approve install/build scripts for these trusted dev dependencies.
allowBuilds:
  esbuild: true
  lefthook: true
  unrs-resolver: true

# Force patched versions of vulnerable transitive (dev-only) dependencies.
# Scoped by range so each major line stays on its own patched release
# (e.g. minimatch v3 consumers keep the v3 API, v9 consumers keep v9).
overrides:
  brace-expansion@<1.1.13: ^1.1.13
  brace-expansion@>=2.0.0 <2.0.3: ^2.0.3
  handlebars@>=4.0.0 <4.7.9: ^4.7.9
  minimatch@<3.1.4: ^3.1.4
  minimatch@>=9.0.0 <9.0.7: ^9.0.7
  picomatch@<2.3.2: ^2.3.2
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
